<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבחן סימולציה סופי: מבוא למדע הנתונים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6; /* Blue */
            --secondary: #8b5cf6; /* Indigo */
            --bg-dark: #0f172a; /* Slate 900 */
        }
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Option Buttons */
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease-in-out;
            text-align: right;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateX(-4px);
        }
        .option-btn.correct {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }
        .option-btn.incorrect {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: #ef4444 !important;
        }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .option-btn.correct:disabled, .option-btn.incorrect:disabled { opacity: 1; }

        /* Progress Bar Glow */
        .progress-glow { box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6">

    <div id="app" class="max-w-4xl w-full glass-panel rounded-3xl overflow-hidden relative">
        
        <!-- Decorative Background Elements -->
        <div class="absolute top-[-100px] left-[-100px] w-64 h-64 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute bottom-[-100px] right-[-100px] w-64 h-64 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>

        <!-- START SCREEN -->
        <div id="start-screen" class="p-8 sm:p-16 text-center animate-fade-in relative z-10">
            <div class="inline-block p-4 rounded-full bg-blue-500/20 text-blue-400 mb-6 border border-blue-500/30">
                <i class="fa-solid fa-graduation-cap text-5xl"></i>
            </div>
            <h1 class="text-4xl sm:text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">
                הסימולציה המלאה: מבוא למדע הנתונים
            </h1>
            <p class="text-slate-300 text-lg sm:text-xl mb-8 max-w-2xl mx-auto leading-relaxed">
                60 שאלות המבוססות במדויק על המיקוד והמבחן לדוגמה. 
                מסיחי דעת ברמה גבוהה, ללא ידע חיצוני. מכסה Pandas, ניקוי נתונים, מודלים של Machine Learning ומדדי הערכה.
            </p>
            <button onclick="startQuiz()" class="group relative px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full font-bold text-lg hover:from-blue-500 hover:to-indigo-500 transition-all shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:shadow-[0_0_30px_rgba(59,130,246,0.6)] focus:outline-none">
                <span class="mr-2">התחל במבחן</span>
                <i class="fa-solid fa-play group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden flex flex-col min-h-[650px] relative z-10">
            
            <!-- Header & Progress -->
            <div class="p-5 sm:p-6 border-b border-white/10 bg-black/20">
                <div class="flex justify-between items-center mb-4">
                    <div class="text-blue-400 font-semibold tracking-wide">
                        <i class="fa-solid fa-clipboard-question ml-2"></i>שאלה <span id="current-q-num">1</span> / 60
                    </div>
                    <div class="bg-blue-500/20 border border-blue-500/30 px-4 py-1.5 rounded-full text-blue-300 font-bold">
                        <i class="fa-solid fa-trophy ml-2"></i><span id="score-display">0</span> נק'
                    </div>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-gradient-to-r from-blue-400 to-indigo-500 h-2.5 rounded-full progress-glow transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- Question Area -->
            <div class="flex-grow p-6 sm:p-8 flex flex-col justify-center">
                <h2 id="question-text" class="text-2xl sm:text-3xl font-bold leading-tight mb-8 text-white"></h2>
                
                <div id="options-container" class="space-y-4 w-full max-w-3xl mx-auto">
                    <!-- Options injected here -->
                </div>

                <!-- Feedback Area -->
                <div id="feedback-area" class="hidden mt-8 p-6 rounded-2xl border animate-fade-in">
                    <div class="flex items-center mb-3">
                        <i id="feedback-icon" class="text-2xl ml-3"></i>
                        <h3 id="feedback-title" class="text-xl font-bold"></h3>
                    </div>
                    <p id="feedback-rationale" class="text-slate-300 leading-relaxed"></p>
                    
                    <button id="next-btn" onclick="nextQuestion()" class="mt-6 w-full py-3 sm:py-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl font-bold transition-all focus:outline-none flex justify-center items-center text-lg">
                        המשך לשאלה הבאה <i class="fa-solid fa-arrow-left mr-2"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="result-screen" class="hidden p-8 sm:p-16 text-center animate-fade-in relative z-10">
            <div id="result-icon-container" class="inline-block p-6 rounded-full mb-6 border-4">
                <i id="result-icon" class="text-6xl"></i>
            </div>
            <h2 id="result-title" class="text-4xl sm:text-5xl font-black mb-3"></h2>
            <p id="result-subtitle" class="text-xl text-slate-400 mb-8"></p>
            
            <div class="text-7xl sm:text-8xl font-black mb-8 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400 drop-shadow-lg">
                <span id="final-score"></span>/60
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center mt-10">
                <button onclick="shareResults()" class="px-8 py-4 bg-green-600 hover:bg-green-500 text-white rounded-xl font-bold transition-all shadow-lg hover:shadow-green-500/50 flex justify-center items-center text-lg">
                    <i class="fa-brands fa-whatsapp ml-2 text-2xl"></i> שתף תוצאה
                </button>
                <button onclick="location.reload()" class="px-8 py-4 bg-white/10 hover:bg-white/20 border border-white/20 text-white rounded-xl font-bold transition-all flex justify-center items-center text-lg">
                    <i class="fa-solid fa-rotate-right ml-2"></i> נסה שוב
                </button>
            </div>
            <p id="share-toast" class="text-green-400 mt-4 opacity-0 transition-opacity font-medium">הטקסט הועתק ללוח!</p>
        </div>
    </div>

    <script>
        const questions = [
            // --- CRISP-DM & Exception Handling ---
            {
                q: "מהו השלב הראשון במודל CRISP-DM (מחזור החיים של פרויקט מדע הנתונים)?",
                options: [
                    "הכנת נתונים וניקוי שגיאות (Data Preparation).",
                    "איסוף נתונים ממקורות שונים (Data Understanding).",
                    "הבנת הבעיה העסקית (Business Understanding).",
                    "בניית מודל למידת מכונה ראשוני (Modeling)."
                ],
                answer: 2,
                rationale: "לפי מודל CRISP-DM, השלב הראשון והקריטי ביותר הוא הבנת הבעיה העסקית לפני שניגשים לנתונים."
            },
            {
                q: "באיזה שלב במודל CRISP-DM המערכת יוצאת מסביבת הפיתוח ומשולבת במערכות האמיתיות של החברה?",
                options: [
                    "הערכת המודל (Evaluation).",
                    "הטמעת המודל (Deployment).",
                    "הכנת הנתונים (Data Preparation).",
                    "בניית המודל (Modeling)."
                ],
                answer: 1,
                rationale: "שלב ההטמעה (Deployment) הוא השלב האחרון בו המודל מותקן בסביבת הייצור האמיתית."
            },
            {
                q: "במנגנון טיפול בשגיאות בפייתון (Exception Handling), מה מטרת הבלוק except?",
                options: [
                    "הוא מכיל את הקוד המסוכן שעלול לזרוק שגיאה בזמן ריצה.",
                    "הוא מכיל את הקוד שיבוצע תמיד, גם אם התרחשה שגיאה וגם אם לא.",
                    "הוא מכיל את הקוד שיבוצע אך ורק אם הקוד עבר בהצלחה מלאה.",
                    "הוא מכיל את הקוד שיבוצע רק במידה והתרחשה שגיאה בחלק של ה-try."
                ],
                answer: 3,
                rationale: "בלוק ה-except 'תופס' את השגיאה שנזרקה ב-try ומגדיר לתוכנית כיצד להתמודד איתה במקום לקרוס."
            },
            {
                q: "מתי יתבצע הקוד שנמצא תחת בלוק finally במנגנון try-except-finally?",
                options: [
                    "רק אם התרחשה שגיאה מסוג ValueError.",
                    "רק אם הקוד בבלוק ה-try התבצע ללא שום שגיאות.",
                    "הקוד יתבצע תמיד בסוף התהליך, ללא קשר להתרחשות שגיאה.",
                    "רק במידה ובלוק ה-except נכשל בטיפול בשגיאה."
                ],
                answer: 2,
                rationale: "הבלוק finally נועד לפעולות ניקיון וסיום (כמו סגירת קבצים), והוא מופעל תמיד."
            },
            {
                q: "אנו רצים על שורות ב-DataFrame בעזרת iterrows() ומנסים להמיר עמודה ל-float בתוך בלוק try-except ValueError. מה יקרה לשורה המכילה טקסט?",
                options: [
                    "התוכנית תקרוס לחלוטין עם שגיאת SyntaxError.",
                    "השגיאה תיתפס ב-except ונוכל להגדיר קוד חלופי מבלי שהתוכנית תעצור.",
                    "פונקציית iterrows תדלג אוטומטית על השורה הזו ותעבור הלאה.",
                    "פייתון ימיר את הטקסט באופן אוטומטי למספר 0."
                ],
                answer: 1,
                rationale: "זוהי המטרה של טיפול בשגיאות בניקוי נתונים: השגיאה 'נתפסת', והלולאה יכולה להמשיך לרוץ לשורה הבאה."
            },

            // --- Pandas: Creation, Inspection, Casting ---
            {
                q: "מהי הפקודה הנכונה ב-Pandas ליצירת DataFrame חדש מתוך מילון פייתון בשם 'data'?",
                options: [
                    "df = pd.CreateDataFrame(data)",
                    "df = pd.New(data)",
                    "df = pd.Generate(data)",
                    "df = pd.DataFrame(data)"
                ],
                answer: 3,
                rationale: "הפונקציה המובנית ליצירת טבלה בספריית Pandas היא pd.DataFrame()."
            },
            {
                q: "כיצד מוסיפים עמודה חדשה ששמה 'new_column' שמאותחלת עם הערך המשתנה 'value'?",
                options: [
                    "df.insert('new_column', value)",
                    "df['new_column'] = value",
                    "df.add_column('new_column', value)",
                    "df.append('new_column', value)"
                ],
                answer: 1,
                rationale: "בפנדס מוסיפים עמודה חדשה (או דורסים קיימת) על ידי פנייה אליה בסוגריים מרובעים והשמת ערך."
            },
            {
                q: "איזו פונקציה מספקת תעודת זהות טכנית של הטבלה, הכוללת את סוגי הנתונים (Dtypes) וכמות הערכים הלא-חסרים?",
                options: [
                    "df.summary()",
                    "df.describe()",
                    "df.info()",
                    "df.dtypes()"
                ],
                answer: 2,
                rationale: "בעוד describe נותנת מידע סטטיסטי, info() מספקת את המידע הטכני: כמה שורות, סוגי הנתונים וערכים חסרים."
            },
            {
                q: "איך מקבלים סיכום סטטיסטי (ממוצע, חציון, סטיית תקן) לעמודות המספריות של DataFrame?",
                options: [
                    "df.overview()",
                    "df.describe()",
                    "df.stats()",
                    "df.summary()"
                ],
                answer: 1,
                rationale: "הפונקציה describe מציגה את הסטטיסטיקה התיאורית המלאה (count, mean, std, min, 25%, 50%, 75%, max)."
            },
            {
                q: "כיצד ניתן להמיר עמודה קיימת בשם 'Price' מסוג מחרוזת (Object) למספר עשרוני (float64)?",
                options: [
                    "df['Price'] = float64(df['Price'])",
                    "df['Price'].change('float64')",
                    "df['Price'].convert('float64')",
                    "df['Price'] = df['Price'].astype('float64')"
                ],
                answer: 3,
                rationale: "הפונקציה התקנית ב-Pandas לשינוי טיפוס נתונים של עמודה (Casting) היא astype()."
            },
            {
                q: "איך מוצאים את מספר השורות הכולל ב-DataFrame בשם df?",
                options: [
                    "df.count()",
                    "len(df)",
                    "df.rows()",
                    "df.len()"
                ],
                answer: 1,
                rationale: "פונקציית len() הבסיסית של פייתון מחזירה את מספר השורות ב-DataFrame. (count מחזירה את מספר הערכים הלא-חסרים לכל עמודה)."
            },

            // --- Pandas: Missing Values & Cleaning ---
            {
                q: "מהי הפונקציה הנכונה למציאת מיקומם של ערכים חסרים בטבלת DataFrame?",
                options: [
                    "df.isna()",
                    "df.missing()",
                    "df.find_nulls()",
                    "df.findna()"
                ],
                answer: 0,
                rationale: "df.isna() (או df.isnull() הזהה לה) מחזירה טבלה בוליאנית של True במקומות בהם חסר ערך."
            },
            {
                q: "מה קורה כאשר מפעילים את הפקודה df.dropna(inplace=True)?",
                options: [
                    "הפקודה זורקת שגיאה כי חסר הפרמטר axis.",
                    "הטבלה מתנקה משורות המכילות ערכים חסרים, והשינוי נשמר בטבלה המקורית.",
                    "המשתנה df הופך למילון ריק.",
                    "כל העמודות המכילות ערך חסר אחד לפחות נמחקות מהטבלה."
                ],
                answer: 1,
                rationale: "הפרמטר inplace=True מבטיח שהמחיקה תתבצע על ה-DataFrame המקורי, ללא צורך בהשמה מחדש (df = df.dropna)."
            },
            {
                q: "כיצד נמחק מהטבלה אך ורק שורות שבהן חסר נתון בעמודה הספציפית 'Age'?",
                options: [
                    "df.drop('Age', axis=0)",
                    "df.dropna(axis='Age')",
                    "df.fillna('Age', inplace=True)",
                    "df.dropna(subset=['Age'])"
                ],
                answer: 3,
                rationale: "הפרמטר subset בפונקציית dropna מאפשר לנו להגביל את חיפוש הערכים החסרים לעמודות ספציפיות בלבד."
            },
            {
                q: "מהי הדרך הנכונה למלא את כל הערכים החסרים בטבלה בערך 0, כך שהשינוי יישמר?",
                options: [
                    "df.fill_nulls(0)",
                    "df.fillna(0, inplace=True)",
                    "df.replace(NaN, 0)",
                    "df = df.fill(0)"
                ],
                answer: 1,
                rationale: "הפונקציה fillna מחליפה את ה-NaN בערך המבוקש. ה-inplace=True שומר את השינוי על ה-DataFrame המקורי."
            },
            {
                q: "הפעלנו את הקוד: df['Salary'].fillna(df['Salary'].mean(), inplace=True). מה תהיה התוצאה?",
                options: [
                    "העמודה תימחק במידה והממוצע שווה לאפס.",
                    "כל הערכים בעמודת השכר יוחלפו בממוצע הכללי.",
                    "הקוד יזרוק שגיאת ValueError בגלל חישוב ממוצע עם NaN.",
                    "כל הערכים החסרים בעמודת השכר יושלמו על ידי הממוצע של אותה עמודה."
                ],
                answer: 3,
                rationale: "זוהי פרקטיקה נפוצה מאוד: אנו מחשבים את הממוצע של העמודה (פנדס מתעלם מ-NaN בחישוב), ומציבים אותו במקום הערכים החסרים."
            },

            // --- Pandas: Filtering, LOC/ILOC, Sorting ---
            {
                q: "מהי הפקודה הנכונה בפנדס לסינון שורות שבהן הערך בעמודה 'Age' גדול מ-30?",
                options: [
                    "df.filter('Age' > 30)",
                    "df.select('Age' > 30)",
                    "df.where('Age' > 30)",
                    "df[df['Age'] > 30]"
                ],
                answer: 3,
                rationale: "התחביר התקני לסינון בוליאני בפנדס דורש להעביר את התנאי המלא בתוך סוגריים מרובעים של ה-DataFrame."
            },
            {
                q: "כיצד נסנן מתוך ה-DataFrame שורות שבהן הגיל מעל 20 וגם הציון (Score) מתחת ל-90?",
                options: [
                    "df.filter(Age > 20 & Score < 90)",
                    "df[(df['Age'] > 20) & (df['Score'] < 90)]",
                    "df[(df['Age'] > 20) and (df['Score'] < 90)]",
                    "df[df['Age'] > 20 & df['Score'] < 90]"
                ],
                answer: 1,
                rationale: "בתנאים מורכבים בפנדס חייבים לעטוף כל תנאי בנפרד בסוגריים עגולים, ולהשתמש באופרטור & (ולא ב-and של פייתון)."
            },
            {
                q: "מהו ההבדל העיקרי בין פונקציית loc לפונקציית iloc ב-Pandas?",
                options: [
                    "loc משמשת לשליפה לפי מיקום מספרי (אינדקס), ו-iloc לשליפה לפי שמות עמודות ותנאים.",
                    "loc מיועדת לעדכון נתונים, ו-iloc מיועדת למחיקת נתונים בלבד.",
                    "loc משמשת לשליפה לפי שמות (תוויות) ותנאים לוגיים, ו-iloc מתבססת אך ורק על מיקומים מספריים.",
                    "אין שום הבדל מעשי ביניהן, אלו שמות נרדפים לאותה פעולה."
                ],
                answer: 2,
                rationale: "האות i ב-iloc מציינת Integer (או Index). loc עובדת עם שמות בפועל ותנאי סינון לוגיים."

                    circle.innerHTML = '<i class="fa-solid fa-check text-xs"></i>';
                    circle.className = "w-6 h-6 rounded-full bg-green-500 text-white flex-shrink-0 flex items-center justify-center border-none shadow-[0_0_10px_rgba(16,185,129,0.8)]";
                } else if(i === selectedIndex && !isCorrect) {
                    allBtns[i].classList.add('incorrect');
                    circle.innerHTML = '<i class="fa-solid fa-xmark text-xs"></i>';
                    circle.className = "w-6 h-6 rounded-full bg-red-500 text-white flex-shrink-0 flex items-center justify-center border-none";
                } else {
                    allBtns[i].classList.add('opacity-50');
                }
            }

            // Feedback Logic
            feedbackContainer.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
            
            if(isCorrect) {
                score++;
                scoreDisplay.textContent = score;
                feedbackContainer.classList.add('bg-green-500/10', 'border-green-500/30');
                feedbackTitle.textContent = "בול פגיעה!";
                feedbackTitle.className = "text-xl font-bold text-green-400";
                feedbackIcon.className = "fa-solid fa-circle-check text-green-400 text-2xl ml-3";
            } else {
                feedbackContainer.classList.add('bg-red-500/10', 'border-red-500/30');
                feedbackTitle.textContent = "לא מדויק...";
                feedbackTitle.className = "text-xl font-bold text-red-400";
                feedbackIcon.className = "fa-solid fa-circle-xmark text-red-400 text-2xl ml-3";
            }

            feedbackRationale.innerHTML = `<span class="font-bold text-white">הסבר: </span>${q.rationale}`;
            
            if(currentQuestionIndex === questions.length - 1) {
                nextBtn.innerHTML = 'סיים מבחן וצפה בתוצאות <i class="fa-solid fa-flag-checkered mr-2"></i>';
                nextBtn.classList.replace('hover:bg-white/20', 'bg-blue-600');
                nextBtn.classList.add('hover:bg-blue-500', 'border-blue-500');
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if(currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            progressBar.style.width = '100%';
            
            document.getElementById('final-score').textContent = score;
            const percentage = (score / questions.length) * 100;
            
            const title = document.getElementById('result-title');
            const subtitle = document.getElementById('result-subtitle');
            const icon = document.getElementById('result-icon');
            const iconCont = document.getElementById('result-icon-container');

            if(percentage >= 90) {
                title.textContent = "מדען נתונים מדופלם!";
                subtitle.textContent = "רמת השליטה שלך בחומר היא פנומנלית. אתה לגמרי מוכן למבחן האמיתי.";
                icon.className = "fa-solid fa-crown text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]";
                iconCont.className = "inline-block p-6 rounded-full mb-6 border-4 border-yellow-400/30 bg-yellow-400/10";
            } else if(percentage >= 70) {
                title.textContent = "עבודה טובה מאוד!";
                subtitle.textContent = "שליטה חזקה בחומר. חזרה קטנה על ההסברים של הטעויות וזה יהיה מושלם.";
                icon.className = "fa-solid fa-medal text-blue-400 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]";
                iconCont.className = "inline-block p-6 rounded-full mb-6 border-4 border-blue-400/30 bg-blue-400/10";
            } else if(percentage >= 55) {
                title.textContent = "עובר, אבל יש מקום לשיפור";
                subtitle.textContent = "השאלות המכשילות כנראה הפילו אותך. זה הזמן לעבור על דף הנוסחאות שהכנו.";
                icon.className = "fa-solid fa-book-open text-indigo-400 drop-shadow-[0_0_15px_rgba(99,102,241,0.8)]";
                iconCont.className = "inline-block p-6 rounded-full mb-6 border-4 border-indigo-400/30 bg-indigo-400/10";
            } else {
                title.textContent = "דרוש חישוב מסלול מחדש";
                subtitle.textContent = "החומר התיאורטי והקוד עדיין לא יושבים מספיק טוב. מומלץ לתרגל את המבחן הזה שוב מההתחלה.";
                icon.className = "fa-solid fa-triangle-exclamation text-red-400 drop-shadow-[0_0_15px_rgba(248,113,113,0.8)]";
                iconCont.className = "inline-block p-6 rounded-full mb-6 border-4 border-red-400/30 bg-red-400/10";
            }
        }

        function shareResults() {
            const percentage = Math.round((score / questions.length) * 100);
            const text = `סיימתי עכשיו סימולציה מקיפה במבוא למדע הנתונים וקיבלתי ${score}/${questions.length} (${percentage}%)! 🚀📊\nמי אמר פנדס ולא קיבל?`;
            
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('share-toast');
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 3000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const toast = document.getElementById('share-toast');
                    toast.classList.remove('opacity-0');
                    setTimeout(() => toast.classList.add('opacity-0'), 3000);
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                }
                document.body.removeChild(textArea);
            });
        }
    </script>
</body>
</html>
