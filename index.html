<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאסטר סטטיסטיקה - המבחן הסופי</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --primary: #4338ca;
            --primary-light: #6366f1;
            --white: #ffffff;
            --correct-bg: #d1fae5;
            --correct-border: #10b981;
            --correct-text: #065f46;
            --wrong-bg: #fee2e2;
            --wrong-border: #ef4444;
            --wrong-text: #991b1b;
            --option-bg: #f8fafc;
            --option-hover: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            font-family: 'Rubik', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Header --- */
        .header {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            padding: 40px 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 400;
        }

        /* --- Main Container --- */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            flex-grow: 1;
        }

        /* --- Progress Bar --- */
        .progress-bar-container {
            background: var(--white);
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .track {
            width: 100%;
            height: 12px;
            background-color: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background-color: var(--primary-light);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
        }

        /* --- Quiz Card --- */
        .quiz-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            position: relative;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* --- Options --- */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 30px;
        }

        .option-btn {
            background-color: var(--option-bg);
            border: 2px solid #cbd5e1;
            border-radius: 16px;
            padding: 20px 25px;
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-main);
            text-align: right;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--option-hover);
            border-color: #94a3b8;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            transform: none;
        }

        /* States for selected options */
        .option-btn.correct-ans {
            background-color: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: var(--correct-text) !important;
            font-weight: 700;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .option-btn.wrong-ans {
            background-color: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: var(--wrong-text) !important;
            opacity: 0.8;
        }

        /* --- Feedback Box --- */
        .feedback-container {
            display: none;
            margin-top: 35px;
            padding: 25px;
            border-radius: 16px;
            animation: slideDown 0.3s ease-out forwards;
            font-size: 1.15rem;
            line-height: 1.6;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-container.show-correct {
            display: block;
            background-color: #ecfdf5;
            border: 2px solid var(--correct-border);
            color: var(--correct-text);
        }

        .feedback-container.show-wrong {
            display: block;
            background-color: #fef2f2;
            border: 2px solid var(--wrong-border);
            color: var(--wrong-text);
        }

        .feedback-header {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- SPSS Tables Formatting --- */
        .spss-wrapper {
            background: #fff;
            border: 1px solid #cbd5e1;
            padding: 20px;
            margin: 25px 0;
            border-radius: 8px;
            overflow-x: auto;
            direction: ltr;
            text-align: left;
            font-family: Arial, sans-serif;
            color: #000;
        }

        .spss-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .spss-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 600px;
        }

        .spss-table th, .spss-table td {
            padding: 6px 12px;
            text-align: right;
        }

        .spss-table th {
            border-top: 2px solid #000;
            border-bottom: 1px solid #000;
            font-weight: bold;
            vertical-align: bottom;
        }

        .spss-table .row-title {
            text-align: left;
            font-weight: normal;
        }

        .spss-table tbody tr:last-child td {
            border-bottom: 2px solid #000;
        }

        .spss-note {
            font-size: 11px;
            color: #4b5563;
            margin-top: 8px;
        }

        /* --- Actions --- */
        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
        }

        .btn-next {
            display: none;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 16px 40px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(67, 56, 202, 0.4);
        }

        .btn-next:hover {
            background-color: var(--primary-light);
            transform: translateY(-2px);
        }

        /* --- Results --- */
        #resultsScreen {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--white);
            border: 12px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0 auto 30px;
            box-shadow: var(--shadow-lg);
        }

        @media (max-width: 768px) {
            .quiz-card { padding: 25px; }
            .question-text { font-size: 1.3rem; }
            .option-btn { font-size: 1.1rem; padding: 15px; }
            .header h1 { font-size: 2rem; }
            .btn-next { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>מאסטר סטטיסטיקה - סופי</h1>
        <p>50 שאלות | מניעת ניחוש שיטתי | פלטים ברמת בחינה</p>
    </div>

    <div class="container">
        
        <!-- Quiz Section -->
        <div id="quizSection">
            <div class="progress-bar-container">
                <div class="progress-stats">
                    <span id="qCounter">שאלה 1 / 50</span>
                    <span id="scoreCounter">תשובות נכונות: 0</span>
                </div>
                <div class="track">
                    <div class="fill" id="pFill"></div>
                </div>
            </div>

            <div class="quiz-card" id="card">
                <div class="question-text" id="qText">טוען שאלה...</div>
                <div id="qTable"></div>
                
                <div class="options-grid" id="optionsGrid"></div>

                <div class="feedback-container" id="feedbackBox">
                    <div class="feedback-header" id="fbIcon"></div>
                    <div id="fbContent"></div>
                </div>

                <div class="actions">
                    <button class="btn-next" id="nextBtn" onclick="nextQuestion()">לשאלה הבאה ❯</button>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsScreen" class="quiz-card">
            <h2 style="font-size: 2rem; margin-bottom: 10px;">המבחן הסתיים!</h2>
            <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 40px;">הנה התוצאה הסופית שלך:</p>
            <div class="score-circle" id="finalScore">0%</div>
            <h3 id="finalMessage" style="font-size: 1.8rem; margin-bottom: 30px;"></h3>
            <button class="btn-next" style="display:inline-block;" onclick="location.reload()">התחל מבחן חדש ↻</button>
        </div>

    </div>

    <script>
        // 50 Questions Database
        // 15 Scenarios + 35 Outputs
        // Note: Correct answers vary in length, often being the shortest. Distractors are specifically made longer to break "length=correct" habits.
        
        const qData = [
            // --- Part 1: Scenarios & Identification (15 Qs) ---
            {
                q: "פסיכולוגית קלינית מעוניינת לבדוק האם קיים קשר בין 'אזור מגורים' (מרכז / צפון / דרום) לבין 'סוג טיפול מועדף' (פסיכולוגי / פסיכיאטרי / משולב). באיזה מבחן עליה להשתמש?",
                table: null,
                options: [
                    "מבחן חי בריבוע.",
                    "ניתוח שונות חד כיווני, על מנת להשוות את ממוצעי סוג הטיפול בין שלושת אזורי המגורים השונים בצורה סטטיסטית.",
                    "מתאם פירסון, משום ששני המשתנים מחולקים למספר קטגוריות היוצרות קשר מתאמי רציף במדגם המקורי.",
                    "מבחן T למדגמים בלתי תלויים, כל עוד קיימת הנחת שוויון שונויות (לווין) תקינה בין האזורים השונים."
                ],
                ans: 0,
                exp: "אזור מגורים וסוג טיפול הם שניהם משתנים קטגוריאליים (שמיים). מבחן 'חי בריבוע' הוא המבחן היחיד מבין האפשרויות שמיועד לבדוק קשר/תלות בין שני משתנים קטגוריאליים. התשובה הארוכה על ניתוח שונות היא מלכודת – אין כאן משתנה כמותי שאפשר לחשב לו ממוצע."
            },
            {
                q: "חוקר משווה ממוצעי שכר בין 3 חברות הייטק. הוא מריץ מבחן סטטיסטי ומקבל Sig = 0.452 בטבלה הראשית. מה עליו לעשות כעת?",
                table: null,
                options: [
                    "לעבור מיד למבחן פוסט-הוק מסוג Tukey כדי לאתר בפירוט אילו מהחברות מציגות פערים מובהקים בשכר לעומת החברות האחרות במדגם.",
                    "לבצע 3 מבחני T נפרדים במקום הניתוח המקורי על מנת לתקן את שגיאת הדגימה שנוצרה כתוצאה ממובהקות חלשה.",
                    "לבדוק את התפלגות השונויות דרך מבחן לווין כדי לאשש את ההנחות המקדימות של האנובה.",
                    "הניתוח מסתיים כאן ללא מבחני המשך."
                ],
                ans: 3,
                exp: "כאשר מבצעים ANOVA להשוואת 3 קבוצות ומקבלים Sig > 0.05 (לא מובהק), המסקנה היא שאין הבדל מובהק בין הממוצעים. הכלל קובע: לא דחינו את השערת האפס? עוצרים את הניתוח במקום, ואין הצדקה לעשות פוסט-הוק."
            },
            {
                q: "איזה מבין הנתונים הבאים מעיד במידה הרבה ביותר על עוצמת ההשפעה של מנבא בודד בתוך מודל מרובה מנבאים?",
                table: null,
                options: [
                    "ערך ה- R Square של המודל, אשר משקלל את תרומת כל המנבאים יחד ומייצר אומדן מובהק המנבא את השונות הכללית.",
                    "ערכו המוחלט של המקדם Beta (Standardized).",
                    "רמת המובהקות (Sig) של המנבא הספציפי, אשר מצביעה על עוצמת הדחייה של השערת האפס ברמת ביטחון של 95 אחוזים.",
                    "ערכו של המקדם B (Unstandardized), מכיוון שהוא מציג את ההשפעה המספרית האמיתית על ציר ה-Y ללא הטיות תקנון."
                ],
                ans: 1,
                exp: "R Square בודק את המודל השלם ולא מנבא בודד. מקדם B מושפע מיחידות המידה (אי אפשר להשוות B של שקלים ל-B של שנות לימוד). המקדם המתוקנן (Beta) הוא המדד היחיד שמנרמל את יחידות המידה ומאפשר להשוות איזו משתנה מנבא 'חזק' יותר."
            },
            {
                q: "מורה מחשבת את ממוצע הציונים בבחינה. רגע לפני הפרסום, היא מגלה שתלמיד אחד קיבל בטעות ציון 15 במקום 85, ומתקנת זאת. איזה מדד יושפע הכי פחות מהתיקון?",
                table: null,
                options: [
                    "סטיית התקן המדגמית.",
                    "חציון.",
                    "הממוצע החשבוני הפשוט של כלל הכיתה.",
                    "שונות האוכלוסייה."
                ],
                ans: 1,
                exp: "החציון נקבע אך ורק על פי מיקום הערך האמצעי של סדרת הנתונים. לכן, הוא חסין כמעט לחלוטין בפני ערכים קיצוניים (Outliers). הממוצע וסטיית התקן, לעומת זאת, מושפעים מאוד מכל שינוי בערך מספרי קיצוני."
            },
            {
                q: "במבחן t למדגמים בלתי תלויים, מהי משמעותו של מבחן לווין (Levene's Test)?",
                table: null,
                options: [
                    "בדיקה האם הממוצעים של שתי הקבוצות שווים באופן מובהק באוכלוסייה ממנה נדגמו, בהתבסס על סטיית התקן המשותפת.",
                    "בדיקה האם המדגמים אכן בלתי תלויים זה בזה או שקיימת טעות במערך המחקר הדורשת מבחן תלוי מזווג.",
                    "מציאת כיוון ההבדל הסטטיסטי בין שתי הקבוצות הנבדקות.",
                    "בדיקת הנחת שוויון השונויות בין הקבוצות."
                ],
                ans: 3,
                exp: "מבחן לווין הוא תמיד מבחן מקדים. הוא לא נועד להשוות ממוצעים, אלא רק לבדוק האם השונות (הפיזור) של שתי הקבוצות שווה. התוצאה שלו אומרת לנו איזו שורת תוצאות (t) עלינו לקרוא בשלב הבא."
            },
            {
                q: "מה אומרת השערת האפס (H0) במבחן t למדגמים תלויים (מזווגים)?",
                table: null,
                options: [
                    "הממוצע של שתי הקבוצות הבלתי תלויות זהה לחלוטין ללא יוצא מן הכלל, מה שמוכיח את השערת האפס ברמת האוכלוסייה.",
                    "אין קשר מתאמי מובהק וחיובי בין שתי המדידות של אותו הנבדק לאורך ציר הזמן.",
                    "ההפרש הממוצע בין המדידה הראשונה לשנייה שווה לאפס.",
                    "תוחלת ההפרשים שונה מאפס באוכלוסייה הרלוונטית, ולכן קיימת השפעה של הטיפול שניתן לנבדקים."
                ],
                ans: 2,
                exp: "במדגמים תלויים מודדים את אותו אדם פעמיים (לפני ואחרי) ומסתכלים רק על ההפרש. השערת האפס תמיד מניחה 'לא קרה כלום', כלומר ממוצע ההפרשים האלה הוא בדיוק אפס."
            },
            {
                q: "חוקר משתמש באלפא של קרונבך עבור שאלון בן 8 פריטים ומקבל תוצאה של 0.52. מהי הפעולה המומלצת ביותר עבורו?",
                table: null,
                options: [
                    "להמשיך לניתוח הנתונים כרגיל, שכן כל תוצאה חיובית (מעל 0.50) מעידה על קשר מתון ותקין בין פריטי השאלון השונים.",
                    "לבצע מבחן חי בריבוע על כל אחד מהפריטים בנפרד כדי לוודא שלא חלו סטיות התפלגות קשות במדגם.",
                    "לבחון את עמודת Item-Deleted לאיתור פריטים פגומים.",
                    "להכפיל את כמות התצפיות במדגם פי שתיים על מנת לעלות את המהימנות הפנימית ל-1.04."
                ],
                ans: 2,
                exp: "אלפא של 0.52 נחשבת למהימנות בעייתית ונמוכה (הסף הנדרש הוא 0.7 ומעלה). במקרה כזה, עליו לחפש בטבלת 'Alpha if item deleted' האם יש שאלה ספציפית ש'הורסת' את השאלון, ואם מחיקתה תשפר את המהימנות הכוללת."
            },
            {
                q: "מדוע לא נשתמש פשוט ב-3 מבחני T נפרדים במקום ניתוח שונות (ANOVA) כאשר אנו בודקים הבדלים בין 3 קבוצות (א', ב', ו-ג')?",
                table: null,
                options: [
                    "מכיוון שמבחן T מחשב שונויות שונות בלבד ואינו מסוגל להתמודד עם שונויות משותפות של מעל שתי קבוצות תלויות.",
                    "מכיוון שלא ניתן מתמטית לחשב ממוצע לקבוצה ג' ללא תלות בקבוצות א' ו-ב' בשל מרכיבי השגיאה המקרית.",
                    "כדי להימנע מהגדלת הסיכוי לטעות מסוג ראשון.",
                    "כי רמת המובהקות הסטנדרטית מתחלקת ב-3 ומונעת כל אפשרות להגעה לתוצאה מובהקת במדגמים קטנים."

                ],
                ans: 2,
                exp: "רווח הסמך (Confidence Interval) נותן לנו טווח אפשרי לתוצאה באוכלוסייה. אם הטווח מתחיל במספר שלילי ונגמר במספר חיובי, הוא 'חוצה את האפס'. אם האפס (העדר הבדל) הוא אפשרות סבירה באוכלוסייה, התוצאה במדגם אינה חזקה מספיק כדי להיות מובהקת."
            }
        ];

        // --- Logic & State ---
        let currentQIndex = 0;
        let score = 0;
        let shuffledQuestions = [];
        let userAnswers = [];

        function initApp() {
            // Shuffle the raw questions array
            shuffledQuestions = [...qData].sort(() => Math.random() - 0.5);
            userAnswers = new Array(shuffledQuestions.length).fill(null);
            
            renderQuestion();
            updateProgress();
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQIndex];
            document.getElementById('qText').innerHTML = `<strong>שאלה ${currentQIndex + 1}:</strong> ${q.q}`;
            document.getElementById('qTable').innerHTML = q.table ? q.table : '';
            
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                let btnClass = 'option-btn';
                let disabledAttr = '';
                
                // Set styling if already answered
                if (userAnswers[currentQIndex] !== null) {
                    disabledAttr = 'disabled';
                    if (idx === q.ans) {
                        btnClass += ' correct-ans';
                    } else if (idx === userAnswers[currentQIndex]) {
                        btnClass += ' wrong-ans';
                    }
                }

                optionsHtml += `<button class="${btnClass}" ${disabledAttr} onclick="handleAnswer(${idx})">${opt}</button>`;
            });
            document.getElementById('optionsGrid').innerHTML = optionsHtml;

            const feedbackBox = document.getElementById('feedbackBox');
            const nextBtn = document.getElementById('nextBtn');

            // If question is answered, show feedback and next button
            if (userAnswers[currentQIndex] !== null) {
                showFeedback(currentQIndex, userAnswers[currentQIndex]);
                nextBtn.style.display = 'inline-block';
            } else {
                feedbackBox.style.display = 'none';
                feedbackBox.className = 'feedback-container';
                nextBtn.style.display = 'none';
            }

            if (currentQIndex === shuffledQuestions.length - 1 && userAnswers[currentQIndex] !== null) {
                nextBtn.innerText = 'סיים מבחן וצפה בציון הסופי 🏆';
            } else {
                nextBtn.innerText = 'המשך לשאלה הבאה ❯';
            }
        }

        function handleAnswer(selectedIndex) {
            if (userAnswers[currentQIndex] !== null) return; // Prevent multiple clicks

            userAnswers[currentQIndex] = selectedIndex;
            const q = shuffledQuestions[currentQIndex];
            
            if (selectedIndex === q.ans) score++;

            renderQuestion();
            updateProgress();
        }

        function showFeedback(index, selectedIndex) {
            const q = shuffledQuestions[index];
            const isCorrect = selectedIndex === q.ans;
            const fbBox = document.getElementById('feedbackBox');
            const fbIcon = document.getElementById('fbIcon');
            const fbContent = document.getElementById('fbContent');
            
            if (isCorrect) {
                fbBox.className = 'feedback-container show-correct';
                fbIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> אלופה! צדקת.`;
                fbContent.innerHTML = `<p><strong>ההסבר הסטטיסטי:</strong> ${q.exp}</p>`;
            } else {
                fbBox.className = 'feedback-container show-wrong';
                fbIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> טעות. שים לב:`;
                fbContent.innerHTML = `
                    <div style="margin-bottom:10px;">התשובה הנכונה היא:</div>
                    <div style="background: white; border:1px solid #ef4444; border-radius: 8px; padding: 12px 15px; font-weight:700; color: #1e293b; margin-bottom: 15px;">
                        ${q.options[q.ans]}
                    </div>
                    <p><strong>ההסבר הסטטיסטי:</strong> ${q.exp}</p>
                `;
            }
        }

        function handleNext() {
            if (currentQIndex < shuffledQuestions.length - 1) {
                currentQIndex++;
                renderQuestion();
                updateProgress();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            const percent = (answeredCount / shuffledQuestions.length) * 100;
            
            document.getElementById('qCounter').innerText = `שאלה ${currentQIndex + 1} מתוך ${shuffledQuestions.length}`;
            document.getElementById('scoreCounter').innerText = `תשובות נכונות: ${score}`;
            document.getElementById('pFill').style.width = `${percent}%`;
        }

        function showResults() {
            document.getElementById('quizSection').style.display = 'none';
            const resultsScreen = document.getElementById('resultsScreen');
            resultsScreen.style.display = 'block';

            const percent = Math.round((score / shuffledQuestions.length) * 100);
            
            let curP = 0;
            const scoreDisplay = document.getElementById('finalScore');
            const tmr = setInterval(() => {
                curP += 1;
                if (curP >= percent) {
                    curP = percent;
                    clearInterval(tmr);
                }
                scoreDisplay.innerText = `${curP}%`;
            }, 15);

            let msg = "";
            if (percent >= 90) msg = "מבריק! השליטה שלך בחומר מושלמת. אתה מוכן ב-100% למבחן. 🏆";
            else if (percent >= 75) msg = "כל הכבוד! ציון מצוין. קריאת הפלטים שלך טובה מאוד. 🌟";
            else if (percent >= 60) msg = "עברת. אבל כדי להיות בטוח ביום המבחן, מומלץ לחזור על ההסברים שוב. 👍";
            else msg = "זה הזמן לחזרה מעמיקה. קרא היטב את ההסברים שמופיעים אחרי כל טעות, ונסה שוב! 💪";

            document.getElementById('finalMessage').innerHTML = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Start Quiz
        initApp();
    </script>
</body>
</html>
