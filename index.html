<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבחן חזרה אינטראקטיבי - ויזואליזציה של מידע - מועד ב'</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/hebrew@latest/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/heebo@5.0.0/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/assistant@5.0.0/index.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #818cf8;
            --success: #10b981;
            --success-light: #d1fae5;
            --success-dark: #065f46;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --danger-dark: #991b1b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }
        
        body {
            font-family: 'Heebo', 'Assistant', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.7;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light), #a78bfa);
        }
        
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .progress-bar-container {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        
        .progress-bar-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .progress-text {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }
        
        .score-badge {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        
        .progress-track {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 1.25%;
        }
        
        .quiz-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        .btn-nav {
            background: var(--card);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-nav:hover:not(:disabled) {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        
        .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #cbd5e0;
            color: #cbd5e0;
        }
        
        .btn-finish {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            border: none;
            display: none;
        }
        
        .btn-finish:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .question-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 35px;
            box-shadow: var(--shadow-lg);
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .question-card.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .q-num {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: inline-block;
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #c7d2fe;
        }
        
        .statements {
            margin-bottom: 25px;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 20px;
            border-right: 4px solid var(--primary-light);
        }
        
        .statement {
            margin-bottom: 14px;
            line-height: 1.8;
            font-size: 1.02rem;
            color: var(--text);
        }
        
        .statement:last-child {
            margin-bottom: 0;
        }
        
        .statement b {
            color: var(--primary-dark);
        }
        
        .q-title {
            font-weight: 700;
            margin-bottom: 18px;
            font-size: 1.05rem;
            color: var(--text);
        }
        
        .options {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        .option {
            padding: 16px 22px;
            background: #f8fafc;
            margin-bottom: 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid var(--border);
            font-size: 1rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        
        .option::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(79, 70, 229, 0.05));
            transition: width 0.3s ease;
        }
        
        .option:hover::before {
            width: 100%;
        }
        
        .option:hover {
            border-color: var(--primary-light);
            transform: translateX(-4px);
            box-shadow: var(--shadow);
        }
        
        .option.correct {
            background: linear-gradient(135deg, var(--success-light), #a7f3d0) !important;
            border-color: var(--success) !important;
            color: var(--success-dark);
            font-weight: 700;
            animation: correctPulse 0.5s ease;
        }
        
        .option.correct::after {
            content: ' ✓';
            font-weight: 900;
        }
        
        .option.incorrect {
            background: linear-gradient(135deg, var(--danger-light), #fecaca) !important;
            border-color: var(--danger) !important;
            color: var(--danger-dark);
            font-weight: 600;
            animation: shake 0.4s ease;
        }
        
        .option.incorrect::after {
            content: ' ✗';
            font-weight: 900;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .answered .option {
            cursor: default;
            pointer-events: none;
        }
        
        .explanation {
            margin-top: 20px;
            padding: 20px 24px;
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-radius: var(--radius-sm);
            border-right: 4px solid var(--primary);
            animation: slideDown 0.4s ease;
            display: none;
        }
        
        .explanation.show {
            display: block;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .explanation-title {
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 10px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .explanation-content {
            color: #1e40af;
            line-height: 1.8;
            font-size: 0.98rem;
        }
        
        #results-container {
            display: none;
            text-align: center;
            background: var(--card);
            padding: 60px 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.6s ease;
        }
        
        #results-container h2 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .result-score {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0;
        }
        
        .result-details {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        .result-bar {
            height: 16px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 30px auto;
            max-width: 500px;
        }
        
        .result-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-restart {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: var(--radius-sm);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 20px;
        }
        
        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        .emoji-result {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @media (max-width: 640px) {
            body { padding: 10px; }
            .header h1 { font-size: 1.5rem; }
            .question-card { padding: 20px; }
            .btn-nav { padding: 10px 16px; font-size: 0.85rem; }
            .option { padding: 14px 18px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 מבחן חזרה - ויזואליזציה של מידע</h1>
            <p class="subtitle">הכנה למועד ב' - 80 שאלות עם הסברים מפורטים</p>
        </div>
        
        <div id="quiz-container">
            <div class="progress-bar-container">
                <div class="progress-bar-wrapper">
                    <span class="progress-text" id="progress-text">שאלה 1 מתוך 80</span>
                    <span class="score-badge" id="score-badge">✓ 0 נכונות</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            
            <div class="quiz-controls">
                <button class="btn-nav" id="btn-prev" onclick="prevQuestion()" disabled>→ הקודמת</button>
                <button class="btn-nav btn-finish" id="btn-finish" onclick="finishQuiz()">🏁 סיום מבחן</button>
                <button class="btn-nav" id="btn-next" onclick="nextQuestion()">הבאה ←</button>
            </div>
            
            <div id="questions-wrapper">
                <!-- Questions will be inserted here by JS -->
            </div>
        </div>
        
        <div id="results-container">
            <div class="emoji-result" id="result-emoji">🎉</div>
            <h2>כל הכבוד! סיימת את המבחן</h2>
            <div class="result-score" id="result-score">0%</div>
            <div class="result-details" id="result-details"></div>
            <div class="result-bar">
                <div class="result-bar-fill" id="result-bar-fill"></div>
            </div>
            <button class="btn-restart" onclick="location.reload()">🔄 התחל מחדש</button>
        </div>
    </div>

    <script>
        const questionsData = [
            {
                id: 1,
                statements: [
                    '<b>טענה 1:</b> חיבור של קבצי .csv ל-Tableau מבוצע דרך הענן של Tableau',
                    '<b>טענה 2:</b> קבצי CSV הם קבצי טקסט. לפיכך, אי אפשר לפתוח אותם דרך תוכנת Excel אלא דרך תוכנת Tableau בלבד',
                    '<b>טענה 3:</b> קבצי CSV הם קבצי טקסט. לפיכך, חיבורם ל-Tableau מתאפשר דרך לחיצה על Connect ובחירה ב-Text'
                ],
                options: [
                    {val: 'א', text: 'א. כל הטענות נכונות'},
                    {val: 'ב', text: 'ב. טענה 3 בלבד'},
                    {val: 'ג', text: 'ג. טענה 1 בלבד'},
                    {val: 'ד', text: 'ד. טענה 2 בלבד'},
                    {val: 'ה', text: 'ה. טענות 2 ו-3'}
                ],
                correct: 'ב',
                explanation: 'חיבור CSV ל-Tableau מבוצע מקומית דרך Connect → Text File (לא דרך הענן). קבצי CSV הם קבצי טקסט רגילים שניתן לפתוח גם ב-Excel וגם ב-Tableau. לכן רק טענה 3 נכונה.'
            },
            {
                id: 2,
                statements: [
                    '<b>טענה 1:</b> תוכנת Tableau מתמחה בייצור נתונים גולמיים',
                    '<b>טענה 2:</b> תוכנת Tableau Public מאפשרת שיתוף התוצרים לענן, בעוד שתוכנת Tableau Desktop עובדת מקומית בלבד',
                    '<b>טענה 3:</b> בתוך אזור הגדרת השדות ב-Sheets קיימת תצוגה מקדימה אוטומטית של המידע בטבלאות השונות'
                ],
                options: [
                    {val: 'א', text: 'א. טענות 1 ו-3'},
                    {val: 'ב', text: 'ב. טענה 1 בלבד'},
                    {val: 'ג', text: 'ג. כל הטענות נכונות'},
                    {val: 'ד', text: 'ד. כל הטענות שגויות (או כל יתר האפשרויות שגויות)'},
                    {val: 'ה', text: 'ה. טענה 3 בלבד'}
                ],
                correct: 'ה',
                explanation: 'טענה 1 שגויה - Tableau מתמחה בהצגה וויזואליזציה של מידע, לא בייצור נתונים. טענה 2 שגויה - גם Tableau Desktop מאפשר פרסום לענן (דרך Tableau Public/Server). טענה 3 שגויה - אין תצוגה מקדימה אוטומטית ב-Sheets, יש להתחיל לשרטט.'
            },
            {
                id: 3,
                statements: [
                    '<b>טענה 1:</b> לתוכנת Tableau ניתן לחבר קבצים בסיומת .xlsx בלבד',
                    '<b>טענה 2:</b> גרירת משתנים ל-Rows גורמת להגדרת הציר האופקי (X) על בסיס משתנה זה',
                    '<b>טענה 3:</b> גרירת משתנים ל-Rows גורמת להגדרת הציר האנכי (Y) על בסיס משתנה זה'
                ],
                options: [
                    {val: 'א', text: 'א. כל הטענות נכונות'},
                    {val: 'ב', text: 'ב. טענות 1 ו-3'},
                    {val: 'ג', text: 'ג. טענה 3 בלבד'},
                    {val: 'ד', text: 'ד. טענות 2 ו-3'},
                    {val: 'ה', text: 'ה. טענה 2 בלבד'}
                ],
                correct: 'ג',
                explanation: 'טענה 1 שגויה - Tableau תומך במגוון פורמטים: Excel, CSV, Text File, JSON ועוד. טענה 2 שגויה - Columns מגדיר את הציר האופקי (X). טענה 3 נכונה - Rows מגדיר את הציר האנכי (Y).'
            },
            {
                id: 4,
                statements: [
                    '<b>טענה 1:</b> קטגוריות או שנים קלנדריות הם ערכי Dimensions (ממדים)',
                    '<b>טענה 2:</b> ערכי מכירות הם ערכי Measures (מדדים)',
                    '<b>טענה 3:</b> קיים הגיון רב בביצוע חישובים כגון סיכומים על Dimensions אך לא על Measures'
                ],
                options: [
                    {val: 'א', text: 'א. טענות 1 ו-2'},
                    {val: 'ב', text: 'ב. טענות 1 ו-3'},
                    {val: 'ג', text: 'ג. טענה 3 בלבד'},
                    {val: 'ד', text: 'ד. טענה 2 בלבד'},
                    {val: 'ה', text: 'ה. כל הטענות נכונות'}
                ],
                correct: 'א',
                explanation: 'טענה 1 נכונה - קטגוריות ושנים הם ממדים (Dimensions) - ערכים איכותניים. טענה 2 נכונה - מכירות הן מדד (Measure) - ערך כמותי. טענה 3 שגויה - ההפך הוא הנכון: מבצעים חישובים (כמו Sum) על Measures ולא על Dimensions.'
            },
            {
                id: 5,
                statements: [
                    '<b>טענה 1:</b> שימוש ב-Pages מאפשר להגדיר סינון כך שהתרשים יתייחס רק לערכים שנותרו',
                    '<b>טענה 2:</b> שימוש ב-Pages מאפשר דפדוף עם חיצים לשינוי התרשים בהתאם לערך המשתנה',
                    '<b>טענה 3:</b> Dashboards כולל תרשימי Sheets בלבד אלא אם מתקינים תוספים חיצוניים'
                ],
                options: [
                    {val: 'א', text: 'א. כל הטענות נכונות'},
                    {val: 'ב', text: 'ב. טענות 1 ו-2'},
                    {val: 'ג', text: 'ג. טענות 2 ו-3'},
                    {val: 'ד', text: 'ד. טענה 3 בלבד'},
                    {val: 'ה', text: 'ה. טענה 2 בלבד'}
                ],
                correct: 'ה',
                explanation: 'טענה 1 שגויה - Pages לא מסנן נתונים, הוא יוצר דפדוף (קטגוריה נפרדת לכל ערך). סינון נעשה דרך Filters. טענה 2 נכונה - Pages מאפשר דפדוף עם חיצים בין ערכים. טענה 3 שגויה - Dashboard יכול לכלול גם תמונות, טקסט, קישורים ואובייקטים נוספים ללא תוספים.'
            },
            {
                id: 6,
                statements: [
                    '<b>טענה 1:</b> שדות שלצדם מופיע סימון Abc הם שדות הכוללים ערכים מספריים',
                    '<b>טענה 2:</b> שדות שלצדם מופיע סימון Abc הם שדות טקסטואליים',
                    '<b>טענה 3:</b> אם אשנה נתונים ב-Tableau, זה משנה כמובן גם את המידע בקובץ המקור'
                ],
                options: [
                    {val: 'א', text: 'א. טענות 2 ו-3'},
                    {val: 'ב', text: 'ב. טענה 2 בלבד'},
                    {val: 'ג', text: 'ג. טענה 3 בלבד'},
                    {val: 'ד', text: 'ד. טענות 1 ו-3'},
                    {val: 'ה', text: 'ה. כל הטענות שגויות (או כל יתר האפשרויות שגויות)'}
                ],
                correct: 'ב',
                explanation: 'טענה 1 שגויה - Abc מסמל שדה טקסטואלי (לא מספרי). טענה 2 נכונה - Abc = טקסט. טענה 3 שגויה - Tableau לא משנה את קובץ המקור; השינויים נשמרים רק בפרויקט של Tableau.'
            },
            {

            }
        ];

        let currentQuestion = 1;
        const totalQuestions = 80;
        let score = 0;
        let answeredQuestions = {};

        function renderQuestions() {
            const wrapper = document.getElementById('questions-wrapper');
            questionsData.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card' + (idx === 0 ? ' active' : '');
                card.id = 'q-' + q.id;
                
                let statementsHTML = '<div class="statements">';
                q.statements.forEach(s => {
                    statementsHTML += `<div class="statement">${s}</div>`;
                });
                statementsHTML += '</div>';
                
                let optionsHTML = '<ul class="options">';
                q.options.forEach(opt => {
                    optionsHTML += `<li class="option" data-val="${opt.val}" onclick="selectOption(${q.id}, '${opt.val}')">${opt.text}</li>`;
                });
                optionsHTML += '</ul>';
                
                card.innerHTML = `
                    <div class="q-num">שאלה ${q.id}</div>
                    ${statementsHTML}
                    <div class="q-title">הטענה / הטענות הנכונה / הנכונות:</div>
                    ${optionsHTML}
                    <div class="explanation" id="exp-${q.id}">
                        <div class="explanation-title">💡 הסבר:</div>
                        <div class="explanation-content">${q.explanation}</div>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        function showQuestion(qNum) {
            document.querySelectorAll('.question-card').forEach(q => q.classList.remove('active'));
            const targetQ = document.getElementById('q-' + qNum);
            if (targetQ) targetQ.classList.add('active');
            
            document.getElementById('progress-text').innerText = `שאלה ${qNum} מתוך ${totalQuestions}`;
            document.getElementById('progress-fill').style.width = ((qNum / totalQuestions) * 100) + '%';
            document.getElementById('btn-prev').disabled = (qNum === 1);
            
            if (qNum === totalQuestions) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-finish').style.display = 'flex';
            } else {
                document.getElementById('btn-next').style.display = 'flex';
                document.getElementById('btn-finish').style.display = 'none';
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextQuestion() {
            if (currentQuestion < totalQuestions) {
                currentQuestion++;
                showQuestion(currentQuestion);
            }
        }

        function prevQuestion() {
            if (currentQuestion > 1) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }

        function selectOption(qNum, selectedValue) {
            const card = document.getElementById('q-' + qNum);
            if (card.classList.contains('answered')) return;
            
            card.classList.add('answered');
            const qData = questionsData.find(q => q.id === qNum);
            const correctVal = qData.correct;
            
            const allOptions = card.querySelectorAll('.option');
            allOptions.forEach(li => {
                const val = li.getAttribute('data-val');
                if (val === correctVal) li.classList.add('correct');
                if (val === selectedValue && selectedValue !== correctVal) li.classList.add('incorrect');
            });
            
            if (selectedValue === correctVal) {
                score++;
            }
            
            answeredQuestions[qNum] = selectedValue;
            document.getElementById('score-badge').innerText = `✓ ${score} נכונות`;
            
            // Show explanation
            const exp = document.getElementById('exp-' + qNum);
            if (exp) {
                setTimeout(() => exp.classList.add('show'), 300);
            }
        }

        function finishQuiz() {
            document.getElementById('quiz-container').style.display = 'none';
            const resDiv = document.getElementById('results-container');
            resDiv.style.display = 'block';
            
            const pct = Math.round((score / totalQuestions) * 100);
            document.getElementById('result-score').innerText = pct + '%';
            document.getElementById('result-details').innerText = `ענית נכונה על ${score} מתוך ${totalQuestions} שאלות`;
            
            let emoji = '🎉';
            if (pct >= 90) emoji = '🏆';
            else if (pct >= 75) emoji = '🌟';
            else if (pct >= 60) emoji = '👍';
            else if (pct >= 40) emoji = '💪';
            else emoji = '📚';
            document.getElementById('result-emoji').innerText = emoji;
            
            setTimeout(() => {
                document.getElementById('result-bar-fill').style.width = pct + '%';
            }, 200);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = function() {
            renderQuestions();
            showQuestion(1);
        };
    </script>
