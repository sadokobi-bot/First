<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאסטר SPSS: הכנה למבחן בסטטיסטיקה יישומית</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --secondary: #0ea5e9;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-header {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.15);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: 40px;
        }

        .app-header h1 {
            margin: 0 0 10px 0;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .app-header p {
            margin: 0;
            font-size: 1.3rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 0 20px 60px;
        }

        .progress-bar-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            margin-bottom: 30px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .progress-track {
            height: 14px;
            background: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary) 0%, var(--primary) 100%);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            animation: slideUp 0.5s ease-out;
            margin-bottom: 30px;
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .spss-container {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 20px;
            margin: 25px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            direction: ltr; 
            text-align: left;
            overflow-x: auto;
            border-radius: 8px;
        }

        .spss-title {
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            color: #000;
        }

        .spss-table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #000;
            min-width: 600px;
        }

        .spss-table th, .spss-table td {
            padding: 6px 10px;
            text-align: right;
            border-left: 1px solid #f1f5f9;
        }

        .spss-table th {
            border-top: 2px solid #000;
            border-bottom: 1px solid #000;
            font-weight: bold;
            vertical-align: bottom;
            background-color: #f8fafc;
        }

        .spss-table .row-header {
            text-align: left;
            font-weight: normal;
        }

        .spss-table tbody tr:last-child td {
            border-bottom: 2px solid #000;
        }

        .spss-footer {
            font-family: Arial, sans-serif;
            font-size: 11px;
            color: #333;
            margin-top: 10px;
            padding-top: 5px;
        }

        .options-grid {
            display: grid;
            gap: 16px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: right;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-dark);
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
        }

        .option-btn:hover:not(:disabled) {
            border-color: #94a3b8;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        .option-btn.correct {
            background: var(--success-light);
            border-color: var(--success);
            color: #064e3b;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .option-btn.wrong {
            background: var(--danger-light);
            border-color: var(--danger);
            color: #7f1d1d;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
            opacity: 0.7;
        }

        .option-btn:disabled {
            cursor: default;
            transform: none;
        }

        .feedback-box {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            animation: slideUp 0.4s ease-out;
            font-size: 1.15rem;
            line-height: 1.6;
        }

        .feedback-box h4 {
            margin: 0 0 15px 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-box.correct-feedback {
            display: block;
            background: #ecfdf5;
            border-right: 6px solid var(--success);
            color: #064e3b;
        }

        .feedback-box.wrong-feedback {
            display: block;
            background: #fef2f2;
            border-right: 6px solid var(--danger);
            color: #7f1d1d;
        }

        .correct-answer-highlight {
            display: inline-block;
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid var(--danger);
            margin: 10px 0;
            font-weight: 700;
        }

        .action-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
        }

        .btn-next {
            display: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.25);
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.35);
        }

        #resultsScreen {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: white;
            border: 10px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin: 0 auto 30px;
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.2);
            position: relative;
        }

        @media (max-width: 768px) {
            .card { padding: 25px; }
            .question-text { font-size: 1.3rem; }
            .option-btn { font-size: 1.1rem; padding: 15px; }
            .app-header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>מאסטר SPSS - מבחן סופי</h1>
        <p>50 שאלות ברמת בחינה | תרחישים וזיהוי פלטים</p>
    </header>

    <div class="container">
        
        <div id="quizScreen">
            <div class="progress-bar-container">
                <div class="progress-info">
                    <span id="progressText">שאלה 1 מתוך 50</span>
                    <span id="scoreTracker">הצלחות: 0</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="card" id="questionCard">
                <div class="question-text" id="questionText">טוען שאלה...</div>
                <div id="tableContainer"></div>
                
                <div class="options-grid" id="optionsGrid">
                    <!-- Options injected via JS -->
                </div>

                <div id="feedbackBox" class="feedback-box">
                    <!-- Feedback injected via JS -->
                </div>

                <div class="action-container">
                    <button class="btn-next" id="btnNext" onclick="nextQuestion()">לשאלה הבאה ❯</button>
                </div>
            </div>
        </div>

        <div id="resultsScreen" class="card">
            <h2>סיום המבחן!</h2>
            <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 30px;">הנה התוצאה הסופית שלך:</p>
            <div class="score-circle" id="finalScore">0%</div>
            <h3 id="finalMessage" style="font-size: 1.8rem; margin-bottom: 40px; color: var(--text-dark);"></h3>
            <button class="btn-next" style="display: inline-block;" onclick="location.reload()">↻ התחל מבחן מחדש</button>
        </div>

    </div>

    <script>
        // 50 Questions: 15 Scenarios, 35 Outputs
        const questions = [
            // --- SECTION 1: Scenarios & Identification (1-15) ---
            {
                q: "חוקר רפואי מעוניין לבדוק האם קיים הבדל ברמת הכולסטרול (משתנה כמותי) בין 4 מחלקות שונות בבית החולים. מהו המבחן הסטטיסטי המתאים ביותר?",
                table: null,
                options: [
                    "מבחן t למדגמים בלתי תלויים.",
                    "ניתוח שונות חד-כיווני (One-Way ANOVA).",
                    "מבחן t למדגמים תלויים.",
                    "מבחן חי בריבוע."
                ],
                ans: 1,
                exp: "כאשר אנו משווים ממוצעים של משתנה כמותי בין 3 קבוצות ומעלה (כאן יש 4 מחלקות בלתי תלויות), המבחן הנדרש הוא ניתוח שונות חד-כיווני."
            },
            {
                q: "מנהל משאבי אנוש רוצה לבדוק האם שילוב של 'ותק' (עד שנה / 1-5 שנים / מעל 5) ו'מגדר' (גבר/אישה) משפיע על 'שביעות רצון' (ציון 1-100), והאם השפעת המגדר משתנה כתלות בוותק. באיזה מבחן ישתמש?",
                table: null,
                options: [
                    "רגרסיה ליניארית מרובה.",
                    "מבחן חי בריבוע.",
                    "ניתוח שונות דו-גורמי (Two-Way ANOVA).",
                    "מבחן t למדגמים בלתי תלויים."
                ],
                ans: 2,
                exp: "יש כאן משתנה תלוי כמותי אחד (שביעות רצון) ושני משתנים בלתי תלויים קטגוריאליים (ותק, מגדר). כמו כן, הוא מחפש אינטראקציה (האם השפעה אחת תלויה בשנייה). זהו ניתוח שונות דו-כיווני."
            },
            {
                q: "פסיכולוגית רוצה לבדוק אם קיימת תלות בין 'סוג התמכרות' (עישון / אלכוהול / הימורים) לבין 'הצלחה בגמילה' (כן / לא). מה המבחן המתאים?",
                table: null,
                options: [
                    "מבחן חי בריבוע.",
                    "מתאם פירסון.",
                    "ניתוח שונות חד-כיווני.",
                    "רגרסיה פשוטה."
                ],
                ans: 0,
                exp: "המשתנה הבלתי תלוי הוא שמי (סוג התמכרות), וגם המשתנה התלוי הוא שמי/דיכוטומי (הצלחה - כן/לא). קשר בין שני משתנים קטגוריאליים נבדק באמצעות חי בריבוע."
            },
            {
                q: "חוקר יצר שאלון הכולל 15 פריטים המודדים חרדה חברתית. לפני שהוא מחשב ציון מסכם לכל נבדק, הוא רוצה לוודא שכל הפריטים מודדים את אותו עולם תוכן בהצלחה. איזה מדד עליו לבדוק?",
                table: null,
                options: [
                    "R Square.",
                    "אלפא של קרונבך.",
                    "מובהקות של F.",
                    "מבחן לוין."
                ],
                ans: 1,
                exp: "בדיקת עקיבות פנימית של שאלון (האם הפריטים מודדים את אותו המושג יחד) מתבצעת על ידי מדד המהימנות 'אלפא של קרונבך'."
            },
            {
                q: "איזה מבין המדדים הבאים עוזר לנו לקבוע מיהו המנבא החזק ביותר במודל רגרסיה מרובה?",
                table: null,
                options: [
                    "Sig של המודל כולו.",
                    "Unstandardized B.",
                    "R Square.",
                    "Standardized Beta."
                ],
                ans: 3,
                exp: "מקדמי ה-B מושפעים מיחידות המידה (למשל, שקלים מול שנות לימוד). לכן, כדי להשוות עוצמה בין המנבאים השונים, מסתכלים תמיד על המקדמים המתוקננים - Beta."
            },
            {
                q: "במבחן t למדגמים בלתי תלויים, אנו מקבלים פלט הכולל את מבחן לווין (Levene's Test). אם ה-Sig של מבחן לווין הוא 0.015, מה המשמעות?",
                table: null,
                options: [
                    "שיש הבדל מובהק בין ממוצעי הקבוצות.",
                    "שהשונויות של שתי הקבוצות אינן שוות, ויש לקרוא את השורה התחתונה במבחן ה-t.",
                    "שאין הבדל מובהק בין ממוצעי הקבוצות.",
                    "שהשונויות שוות, ויש לקרוא את השורה העליונה במבחן ה-t."
                ],
                ans: 1,
                exp: "מבחן לווין בודק שוויון שונויות. השערת האפס שלו היא שהשונויות שוות. אם Sig < 0.05, אנו דוחים את השערת האפס ומסיקים שהשונויות שונות (Not assumed). לכן קוראים את השורה התחתונה."
            },
            {
                q: "מדוע נעדיף לבצע ניתוח שונות (ANOVA) כדי להשוות בין 4 קבוצות, במקום לבצע 6 מבחני t נפרדים בין כל זוג קבוצות?",
                table: null,
                options: [
                    "מכיוון שמבחן t מיועד רק למדגמים תלויים.",
                    "כי לא ניתן לחשב ממוצע ליותר מ-2 קבוצות במקביל.",
                    "כדי להימנע מהגדלת ההסתברות לטעות מסוג ראשון (דחיית H0 בטעות).",
                    "כי מבחן ANOVA מבטיח תוצאה מובהקת תמיד."
                ],
                ans: 2,
                exp: "כל מבחן t טומן בחובו סיכוי של 5% לטעות. ביצוע מספר רב של מבחני t מגדיל את הסיכוי המצטבר לטעות. ANOVA עושה זאת במבחן אחד ושומר על רמת המובהקות קבועה."
            },
            {
                q: "חוקרת מעוניינת לבדוק אם קיים קשר בין 'משקל התינוק בלידה' (כמותי) לבין 'מספר שבועות ההיריון' (כמותי). באיזה מבחן עליה להשתמש?",
                table: null,
                options: [
                    "חי בריבוע.",
                    "מתאם פירסון.",
                    "מבחן t למדגמים בלתי תלויים.",
                    "ניתוח שונות דו-כיווני."
                ],
                ans: 1,
                exp: "כאשר רוצים לבדוק רק האם קיים קשר בין שני משתנים כמותיים ומה עוצמתו (ולא בהכרח לנבא אחד באמצעות השני עם מספר מנבאים), משתמשים במקדם המתאם של פירסון."
            },
            {
                q: "מה אומרת השערת האפס (H0) במבחן t למדגמים תלויים (מזווגים)?",
                table: null,
                options: [
                    "ההפרש בין התצפיות שווה לאפס.",
                    "תוחלת ההפרשים באוכלוסייה שווה לאפס (אין שינוי).",
                    "אין קשר בין שתי הקבוצות הבלתי תלויות.",
                    "הממוצעים של שלוש הקבוצות שווים."
                ],
                ans: 1,
                exp: "במדגמים תלויים אנו מסתכלים על ההפרש (למשל, ציון לפני פחות ציון אחרי). השערת האפס מניחה שלא חל שום שינוי, ולכן תוחלת ההפרשים הללו שווה לאפס."
            },
            {
                q: "בפלט של רגרסיה ליניארית מרובה, בטבלת ה-ANOVA, התקבל ערך Sig = 0.650. מהי משמעות התוצאה?",
                table: null,
                options: [
                    "המודל מובהק ומסביר 65% מהשונות.",
                    "אחד המנבאים מובהק והשני לא.",
                    "מודל הניבוי אינו מובהק כלל ואינו מסביר באופן סטטיסטי את השונות במשתנה התלוי.",
                    "יש להמשיך למבחן פוסט הוק."
                ],
                ans: 2,
                exp: "טבלת ה-ANOVA ברגרסיה בודקת את מובהקות המודל *כולו*. אם ה-Sig מעל 0.05, המודל אינו מובהק והמשתנים בו לא מצליחים לנבא את המשתנה התלוי יחד."
            },
            {
                q: "חוקר ביצע מבחן ANOVA חד-כיווני והתקבל Sig = 0.082. מהו השלב הבא?",
                table: null,
                options: [
                    "ביצוע מבחן פוסט-הוק מסוג טוקי.",
                    "בדיקת מובהקות במבחן לווין.",
                    "אין צורך להמשיך. לא נמצא הבדל מובהק בין הקבוצות.",
                    "מחיקת אחת הקבוצות מתוך המודל והרצה מחדש."
                ],
                ans: 2,
                exp: "כאשר ה-Sig ב-ANOVA גדול מ-0.05, אנו לא דוחים את השערת האפס (אין הבדלים). אם אין הבדלים, אין שום סיבה לבצע מבחן פוסט-הוק (שמטרתו למצוא איפה ההבדלים מסתתרים)."
            },
            {
                q: "מה מסמל הסטטיסטי F בניתוח שונות (ANOVA)?",
                table: null,
                options: [
                    "את אחוז השונות המוסברת.",
                    "את היחס בין השונות *בין* הקבוצות לשונות *בתוך* הקבוצות.",
                    "את עוצמת הקשר בין המשתנים הקטגוריאליים.",
                    "את ממוצע ההפרשים בין המדידה הראשונה לשנייה."

                table: null,

        // --- Application Logic ---
        let currentQuestionIndex = 0;
        let score = 0;
        const userAnswers = new Array(questions.length).fill(null);

        function initQuiz() {
            renderQuestion(currentQuestionIndex);
            updateProgress();
        }

        function renderQuestion(index) {
            const q = questions[index];
            const container = document.getElementById('optionsGrid');
            
            document.getElementById('questionText').innerHTML = `שאלה ${index + 1}: ${q.q}`;
            document.getElementById('tableContainer').innerHTML = q.table ? q.table : '';
            
            let html = '';
            q.options.forEach((opt, optIndex) => {
                let btnClass = 'option-btn';
                let disabledAttr = '';
                
                if (userAnswers[index] !== null) {
                    disabledAttr = 'disabled';
                    if (optIndex === q.ans) {
                        btnClass += ' correct';
                    } else if (optIndex === userAnswers[index]) {
                        btnClass += ' wrong';
                    }
                }

                html += `
                    <button class="${btnClass}" ${disabledAttr} onclick="checkAnswer(${optIndex}, this)">
                        <div style="flex-grow:1; text-align:right;">${opt}</div>
                    </button>
                `;
            });
            
            container.innerHTML = html;

            const feedbackBox = document.getElementById('feedbackBox');
            if (userAnswers[index] !== null) {
                showFeedback(index, userAnswers[index]);
                document.getElementById('btnNext').style.display = 'inline-block';
            } else {
                feedbackBox.style.display = 'none';
                document.getElementById('btnNext').style.display = 'none';
            }

            if (index === questions.length - 1 && userAnswers[index] !== null) {
                document.getElementById('btnNext').innerText = 'סיום והצגת ציון 🏆';
            } else {
                document.getElementById('btnNext').innerText = 'לשאלה הבאה ❯';
            }
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (userAnswers[currentQuestionIndex] !== null) return;

            userAnswers[currentQuestionIndex] = selectedIndex;
            const q = questions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.ans;
            
            if (isCorrect) score++;

            renderQuestion(currentQuestionIndex);
            updateProgress();
        }

        function showFeedback(index, selectedIndex) {
            const q = questions[index];
            const isCorrect = selectedIndex === q.ans;
            const feedbackBox = document.getElementById('feedbackBox');
            
            if (isCorrect) {
                feedbackBox.className = 'feedback-box correct-feedback';
                feedbackBox.innerHTML = `
                    <h4><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> כל הכבוד! תשובה נכונה.</h4>
                    <p>${q.exp}</p>
                `;
            } else {
                feedbackBox.className = 'feedback-box wrong-feedback';
                feedbackBox.innerHTML = `
                    <h4><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> טעות!</h4>
                    <p>התשובה הנכונה היא:</p>
                    <div class="correct-answer-highlight">${q.options[q.ans]}</div>
                    <p><strong>למה?</strong> ${q.exp}</p>
                `;
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion(currentQuestionIndex);
                updateProgress();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const answeredCount = userAnswers.filter(ans => ans !== null).length;
            document.getElementById('progressText').innerText = `שאלה ${currentQuestionIndex + 1} מתוך ${questions.length}`;
            document.getElementById('scoreTracker').innerText = `הצלחות: ${score}/${questions.length}`;
            
            const percent = ((answeredCount) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        function showResults() {
            document.getElementById('quizScreen').style.display = 'none';
            const resultsScreen = document.getElementById('resultsScreen');
            resultsScreen.style.display = 'block';

            const percent = Math.round((score / questions.length) * 100);
            
            let currentPercent = 0;
            const scoreElement = document.getElementById('finalScore');
            const timer = setInterval(() => {
                currentPercent += 2;
                if (currentPercent >= percent) {
                    currentPercent = percent;
                    clearInterval(timer);
                }
                scoreElement.innerText = `${currentPercent}%`;
            }, 25);

            let msg = "";
            if (percent >= 90) msg = "מאסטר SPSS אמיתי! 🏆<br>אתה מוכן לחלוטין למבחן.";
            else if (percent >= 75) msg = "עבודה מעולה! 🌟<br>שליטה טובה מאוד בחומר ובקריאת הפלטים.";
            else if (percent >= 60) msg = "ציון עובר 👍<br>מומלץ לחזור שוב על השאלות שטעית בהן (במיוחד קריאת טבלאות).";
            else msg = "לא נורא 💪<br>זכור את חוק ה-Sig, קרא שוב את הכללים, ותעשה את המבחן מחדש.";

            document.getElementById('finalMessage').innerHTML = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Start App
        initQuiz();
    </script>
