<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבחן גמר בסטטיסטיקה - 50 שאלות</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4338ca;
            --primary-light: #6366f1;
            --secondary: #0ea5e9;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --success-bg: #ecfdf5;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* --- Header --- */
        header {
            width: 100%; background: var(--bg-card);
            padding: 30px 20px; text-align: center;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p { font-size: 1.1rem; color: var(--text-muted); font-weight: 600; }

        /* --- Container & Progress --- */
        .container { width: 100%; max-width: 900px; padding: 40px 20px; }

        .progress-box {
            background: var(--bg-card); border-radius: 16px;
            padding: 20px; box-shadow: var(--shadow);
            border: 1px solid var(--border); margin-bottom: 30px;
        }

        .progress-text {
            display: flex; justify-content: space-between;
            font-size: 1.2rem; font-weight: 700; margin-bottom: 12px;
            color: var(--primary);
        }

        .track {
            width: 100%; height: 10px; background: #e2e8f0;
            border-radius: 10px; overflow: hidden;
        }

        .fill {
            height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary));
            width: 0%; transition: width 0.4s ease; border-radius: 10px;
        }

        /* --- Card --- */
        .card {
            background: var(--bg-card); border-radius: 20px;
            padding: 40px; box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .q-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 30px; line-height: 1.4; }

        /* --- Authentic SPSS Tables --- */
        .spss-wrapper {
            background: #fff; color: #000; border: 1px solid #94a3b8;
            padding: 20px; margin-bottom: 30px; border-radius: 8px;
            overflow-x: auto; direction: ltr; text-align: left;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .spss-title { font-family: Arial, sans-serif; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .spss-table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: Arial, sans-serif; min-width: 500px; }
        .spss-table th, .spss-table td { padding: 6px 10px; text-align: right; border-left: 1px solid #e2e8f0; }
        .spss-table th { border-top: 2px solid #000; border-bottom: 1px solid #000; font-weight: bold; background: #f8fafc; vertical-align: bottom; }
        .spss-table .row-title { text-align: left; font-weight: normal; }
        .spss-table tbody tr:last-child td { border-bottom: 2px solid #000; }
        .spss-note { font-size: 11px; color: #475569; margin-top: 8px; font-family: Arial, sans-serif; }

        /* --- Options --- */
        .options { display: flex; flex-direction: column; gap: 14px; }

        .opt-btn {
            background: #f8fafc; border: 2px solid var(--border);
            border-radius: 14px; padding: 20px; font-size: 1.15rem;
            color: var(--text-main); text-align: right; cursor: pointer;
            transition: all 0.2s ease; line-height: 1.4; font-weight: 500;
        }

        .opt-btn:hover:not(:disabled) { border-color: var(--primary-light); background: #eff6ff; }
        .opt-btn:disabled { cursor: default; }

        .opt-btn.correct { background: var(--success-bg) !important; border-color: var(--success) !important; color: #065f46 !important; font-weight: 700; }
        .opt-btn.wrong { background: var(--danger-bg) !important; border-color: var(--danger) !important; color: #991b1b !important; opacity: 0.8; }

        /* --- Feedback --- */
        .feedback {
            display: none; margin-top: 30px; padding: 25px;
            border-radius: 14px; animation: slideDown 0.3s ease forwards;
            font-size: 1.15rem; line-height: 1.6;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .feedback.is-correct { display: block; background: var(--success-bg); border: 2px solid var(--success); color: #065f46; }
        .feedback.is-wrong { display: block; background: var(--danger-bg); border: 2px solid var(--danger); color: #991b1b; }
        
        .fb-header { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .correct-answer-box { background: rgba(255,255,255,0.8); padding: 12px; border-radius: 8px; border: 1px solid var(--danger); margin: 15px 0; font-weight: 700; color: var(--text-main); }

        /* --- Actions --- */
        .actions { display: flex; justify-content: flex-end; margin-top: 30px; padding-top: 25px; border-top: 1px solid var(--border); }
        
        .btn-next {
            display: none; background: var(--primary); color: white; border: none;
            padding: 16px 35px; font-size: 1.2rem; font-weight: 700;
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);
        }
        .btn-next:hover { background: var(--primary-light); transform: translateY(-2px); }

        /* --- Results --- */
        #resultsScreen { display: none; text-align: center; }
        .score-circle {
            width: 180px; height: 180px; border-radius: 50%;
            background: #fff; border: 12px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; font-weight: 800; color: var(--primary);
            margin: 0 auto 30px; box-shadow: 0 10px 20px rgba(67, 56, 202, 0.2);
        }

        @media (max-width: 768px) {
            .card { padding: 25px; } .q-text { font-size: 1.3rem; }
            .opt-btn { font-size: 1.05rem; padding: 15px; }
            header h1 { font-size: 1.8rem; } .btn-next { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>מבחן גמר בסטטיסטיקה יישומית</h1>
        <p>50 שאלות | מניעת ניחושים | קריאת פלטים מתקדמת</p>
    </header>

    <div class="container">
        
        <div id="quizApp">
            <div class="progress-box">
                <div class="progress-text">
                    <span id="qCount">שאלה 1 מתוך 50</span>
                    <span id="scoreCount">ניקוד ביניים: 0</span>
                </div>
                <div class="track"><div class="fill" id="pFill"></div></div>
            </div>

            <div class="card" id="qCard">
                <div class="q-text" id="qText"></div>
                <div id="qTable"></div>
                <div class="options" id="optGrid"></div>

                <div class="feedback" id="fbBox">
                    <div class="fb-header" id="fbIcon"></div>
                    <div id="fbContent"></div>
                </div>

                <div class="actions">
                    <button class="btn-next" id="nextBtn" onclick="nextQuestion()">המשך לשאלה הבאה ❯</button>
                </div>
            </div>
        </div>

        <div id="resultsScreen" class="card">
            <h2 style="font-size: 2.2rem; margin-bottom: 15px; color: var(--primary);">המבחן הסתיים!</h2>
            <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px;">הציון הסופי שלך מחושב כעת.</p>
            <div class="score-circle" id="finalScore">0%</div>
            <h3 id="finalMsg" style="font-size: 1.6rem; margin-bottom: 30px;"></h3>
            <button class="btn-next" style="display:inline-block;" onclick="location.reload()">התחל מבחן חדש ↻</button>
        </div>

    </div>

    <script>
        // Table generator helper
        function spss(title, th, tb, note='') {
            return `<div class="spss-wrapper"><div class="spss-title">${title}</div><table class="spss-table"><thead>${th}</thead><tbody>${tb}</tbody></table>${note ? `<div class="spss-note">${note}</div>`:''}</div>`;
        }

        // 50 Questions (No Regression). Correct = Short. Distractors = Long & Jargony.
        const qData = [
            // --- Scenarios (1-15) ---
            {
                q: "חוקר בודק את משקל התיק (בגרמים) אצל תלמידים ב-3 בתי ספר שונים. איזה מבחן מתאים?",
                t: null,
                options: [
                    "ניתוח שונות (One-Way ANOVA).",
                    "מבחן t למדגמים בלתי תלויים, מכיוון שהקבוצות אינן חופפות ואנו נדרשים לאמוד את פער התוחלות באוכלוסייה מתוך הנחת שוויון שונויות משולב במדגם כפול.",
                    "מבחן חי בריבוע, לאור העובדה שמדובר בחלוקה לקטגוריות נפרדות של בתי ספר המצריכות טבלת שכיחויות מוצלבת כדי לאתר פיזור אסימפטוטי.",
                    "מתאם פירסון רב-משתני, משום שניתן להתייחס לבתי הספר כמשתני סדר ולחשב את עוצמת וכיוון הקשר הליניארי בינם לבין המשקל."
                ], ans: 0,
                exp: "המשתנה התלוי הוא כמותי (משקל התיק), והמשתנה הבלתי תלוי הוא קטגוריאלי עם 3 קבוצות (בתי ספר). המבחן להשוואת ממוצעים של 3 קבוצות ומעלה הוא ANOVA חד-כיווני."
            },
            {
                q: "מנהל רשת בודק האם קיים קשר תלות בין 'העדפת סניף' (צפון/דרום) לבין 'אמצעי תשלום' (מזומן/אשראי). מהו המבחן הנדרש?",
                t: null,
                options: [
                    "מבחן חי בריבוע.",
                    "מבחן T למדגמים מזווגים (Paired), שכן מדובר באותן העסקאות שנמדדו פעם אחת בקופה ופעם נוספת ברישומי האשראי של הלקוחות הקבועים ברשת.",
                    "ניתוח שונות (ANOVA), שכן ההצלחה במכירות מהווה פונקציה ישירה של שונות אמצעי התשלום אותה יש לנתח על פני קטגוריות גיאוגרפיות שונות.",
                    "מבחן T למדגמים בלתי תלויים, על מנת להשוות את ממוצע העסקאות."
                ], ans: 0,
                exp: "העדפת סניף ואמצעי תשלום הם שניהם משתנים קטגוריאליים. המבחן היחיד לבדיקת קשר/תלות בין משתנים שמיים (קטגוריאליים) הוא חי בריבוע."
            },
            {
                q: "דיאטנית בודקת משקל של 40 אנשים לפני תוכנית התזונה, ושוקלת את *אותם 40 אנשים* שוב בסוף התוכנית. באיזה מבחן תשתמש להוכחת ירידה במשקל?",
                t: null,
                options: [
                    "מבחן T למדגמים בלתי תלויים, בהנחה שמשקלם של האנשים בשתי נקודות הזמן מניב תצפיות בלתי תלויות לחלוטין ברמת האוכלוסייה האסימפטוטית.",
                    "ניתוח שונות דו-גורמי (Two-Way ANOVA), מכיוון שמדובר בשתי מדידות שונות המייצרות שונות פנימית וחיצונית המצדיקות פירוק לדרגות חופש כפולות.",
                    "מבחן T למדגמים תלויים (מזווגים).",
                    "מתאם פירסון לזיהוי קשר שלילי בין המדידות."
                ], ans: 2,
                exp: "כאשר מודדים את *אותם אנשים* פעמיים (לפני ואחרי), המדגמים תלויים זה בזה. כדי להשוות ממוצעים במקרה זה, חובה להשתמש במבחן T למדגמים תלויים."
            },
            {
                q: "חוקר בודק קשר בין 'ותק בעבודה' (בשנים) לבין 'גובה הבונוס' (בשקלים). מה המבחן הסטטיסטי?",
                t: null,
                options: [
                    "מבחן חי בריבוע, לאחר קידוד הוותק לקבוצות של עשורים וביצוע בדיקת תלות אסימפטוטית קפדנית המנכה ערכים חסרים בטבלת הציר.",
                    "מבחן T למדגמים בלתי תלויים, שכן גובה הבונוס נחשב בלתי תלוי לחלוטין בוותק העובד על פי רוב מודלי התגמול המודרניים במחלקות משאבי אנוש.",
                    "ניתוח שונות (ANOVA), המאפשר בחינה של האפקט העיקרי של הגיל והשפעתו על השונות הכללית בין דרגות הבונוס בטבלאות השכר השנתיות.",
                    "מתאם פירסון."
                ], ans: 3,
                exp: "ותק (כמותי) ובונוס (כמותי). המבחן לבדיקת קשר ליניארי בין שני משתנים כמותיים (רציפים) הוא מתאם פירסון."
            },
            {
                q: "מנהל משווה ממוצע מכירות של צוות בוקר לעומת ממוצע מכירות של צוות ערב. איזה מבחן מתאים?",
                t: null,
                options: [
                    "ניתוח שונות דו-גורמי, במטרה לבחון את השפעת המשמרת יחד עם התפלגות השגיאה המקרית המובנית בעבודת הצוותים כפי שנמדדה לאורך תקופת הרבעון המקביל.",
                    "מבחן T למדגמים תלויים, כיוון ששתי הקבוצות עובדות באותה החברה וחולקות סביבת עבודה ארגונית משותפת בעלת תרבות ארגונית אחידה המחייבת תלות סטטיסטית.",
                    "מבחן T למדגמים בלתי תלויים.",
                    "מבחן חי בריבוע, מכיוון שהמשמרת מוגדרת כמשתנה נומינלי שאינו מאפשר חישוב מתמטי רציף ולכן מגביל אותנו לבדיקת שכיחויות בלבד."
                ], ans: 2,
                exp: "מכירות (כמותי) המושוות בין בדיוק שתי קבוצות שונות (בוקר וערב). מכיוון שאלו אנשים שונים, המדגמים בלתי תלויים ולכן משתמשים במבחן T למדגמים בלתי תלויים."
            },
            {
                q: "סוציולוג מעריך שהשפעת 'סוג העיר' (מרכז/פריפריה) על 'גובה הכנסה', שונה משמעותית בין נשים לגברים. איזה מבחן מתאים לבדוק זאת?",
                table: null,
                options: [
                    "מבחן חי בריבוע מורחב, מאחר שיש כאן שילוב של מספר קטגוריות שמיות במקביל היוצרות טבלת ציר מסועפת המצריכה הפעלת מבחן פישר מדויק עבור כל תא ותא בנפרד.",
                    "ניתוח שונות דו-כיווני (Two-Way ANOVA).",
                    "ארבעה מבחני T נפרדים על מנת לבודד כל קבוצת מגדר בנפרד מול כל אזור גיאוגרפי תוך שימוש בתיקון בונפרוני למניעת ניפוח השגיאה הסטטיסטית של המודל.",
                    "אלפא של קרונבך לבדיקת תיאום המשתנים."
                ], ans: 1,
                exp: "החוקר בודק השפעה של שני משתנים בלתי תלויים קטגוריאליים (עיר ומגדר) על משתנה תלוי כמותי (הכנסה), ובמיוחד מחפש *אינטראקציה* (השפעה שמשתנה/תלויה). זהו המקרה הקלאסי של Two-Way ANOVA."
            },
            {
                q: "חוקר ביצע מבחן ANOVA חד-כיווני להשוואת 4 קבוצות, ומצא שה-Sig הוא 0.01. מה עליו לעשות כעת?",
                t: null,
                options: [
                    "לשנות את המבחן ולבצע שורת מבחני T על מנת לאשש את המובהקות הראשונית שהתקבלה במודל הכולל בטרם פרסום המסקנות בספרות האקדמית המחמירה.",
                    "לסיים את הניתוח במקום שכן דחיית השערת האפס מהווה הוכחה חותכת וסופית להצלחת מערך המחקר מתחילתו ועד סופו ללא צורך בניתוחים משניים מורכבים.",
                    "לבצע מבחן Post-Hoc (פוסט הוק).",
                    "לבדוק את התפלגות השונויות מחדש באמצעות מבחן לוין כדי לשלול סטיות תקן חריגות שהשפיעו על ה-F."
                ], ans: 2,
                exp: "כאשר אנובה מעלה תוצאה מובהקת (Sig < 0.05), אנו יודעים שיש הבדל, אך לא יודעים בין אילו קבוצות בדיוק. לכן חובה לבצע מבחן פוסט-הוק (כגון Tukey) שישווה זוגות זוגות."
            },
            {
                q: "חוקרת יצרה שאלון בן 8 פריטים למדידת שביעות רצון. כיצד תוודא שכל השאלות מודדות באופן עקבי את אותו מושג?",
                t: null,
                options: [
                    "אלפא של קרונבך.",
                    "חישוב ערך ה- R Square של השאלון, אשר יעיד על עוצמת הניבוי של שמונת הסעיפים כלפי רמת שביעות הרצון הממשית של העובד כפי שנמדדה על ידי מנהליו הישירים.",
                    "ביצוע ניתוח שונות (ANOVA) כדי להשוות בין ממוצעי התשובות של הסעיפים ולוודא כי אין ביניהם הבדלים מובהקים סטטיסטית העלולים לפגוע בתוקף המבנה הפנימי.",
                    "הפעלת מבחן לוין לשוויון שונויות בין הפריטים."
                ], ans: 0,
                exp: "בדיקת 'עקיבות פנימית' או מהימנות של שאלון רב-פריטים מתבצעת אך ורק על ידי מבחן אלפא של קרונבך."
            },
            {
                q: "מה קובע מבחן לווין (Levene's Test) במבחן T למדגמים בלתי תלויים?",
                t: null,

            {

                `<tr><td class='row-title'>Treatment</td><td>1</td><td>12.5</td><td>.001</td></tr><tr><td class='row-title'>Age_Group</td><td>1</td><td>4.10</td><td>.045</td></tr><tr><td class='row-title'>Treatment * Age_Group</td><td>1</td><td>8.80</td><td>.004</td></tr>`),
                options: [

                    "האינטראקציה (Treatment * Age_Group) מובהקת (Sig=0.004).",
                    "האינטראקציה מובהקת אבל האפקטים העיקריים חלשים ומתבטלים לאור המובהקות המופרזת של ההכפלה האנליטית שמשתקת למעשה את המודל כולו ומחייבת נטישה של התוצאות לטובת מודלים פשוטים יותר המבוססים על מבחני T נפרדים חסרי תלות פיזור העוקפים את הבעיה הטכנית החמורה שנוצרה כאן בתוכנת המחשב המסחרית המותקנת במעבדות ההוראה הזעירות המשמשות את הסטודנטים בשעות התרגול המאוחרות של ימי רביעי בערב כפי שנקבע במערכת השעות הסמסטריאלית שחולקה בתחילת שנת הלימודים הפורמלית על ידי המזכירות האקדמית הרשמית של החוג.",
                    "המבחן פסול כי ה-F גדול מ-5 בשלושת האפקטים העיקריים."
                ], ans: 1,
                exp: "השורה של הכפל הכוללת את סימן הכוכבית (Treatment * Age_Group) מציגה את נתוני אפקט האינטראקציה בניתוח דו כיווני. ה-Sig שלה הוא 0.004 (<0.05). המשמעות הישירה של אינטראקציה מובהקת היא שההשפעה של הטיפול משתנה/תלויה ברמות השונות של קבוצות הגיל, ולא פועלת בוואקום באופן אחיד."
            },
            {
                q: "האם יש צורך לבצע מבחן פוסט הוק כאשר ב-ANOVA דו גורמי, אפקט האינטראקציה אינו מובהק ושני האפקטים העיקריים גם הם אינם מובהקים כלל?",
                t: null,
                options: [
                    "כן, פוסט הוק הוא תמיד חובת ביצוע באנובה על מנת שלא להסתמך על השערות שווא הנובעות מחולשת כוחו המובהק של המבחן הראשוני הנסמך על חלוקת שונויות משותפות המקשות על איתור הפערים הסמויים בין התת-קבוצות המרכיבות את הפסיפס הדמוגרפי המורכב של המדגם הנרחב שנאסף בשיטות רב-שכבתיות מקפידות ומבוקרות היטב טרם הפעלת התוכנה האנליטית המקצועית השמרנית בה אנו עושים שימוש כעת במעבדה.",
                    "כן, אך ורק כדי להיות בטוחים מעל לכל ספק סביר וראוי במסגרת תקנות הפרסום הבינלאומיות של האיגוד הסטטיסטי האמריקאי הפועל כיום להסדרת נהלי הכתיבה המחמירים המונעים פרסומים בעלי תוצאות שגויות העלולות לעלות לציבור ביוקר רב לאור אימוץ פרקטיקות טיפול חסרות תועלת המבוססות על מדע לא מדויק הרווח לפרקים בשולי האקדמיה המודרנית המונעת מכוח ציוני הפרסום ולא מאיכות הנתונים המוצקים כפי שהיה נהוג בעבר המזהיר של המדעים המדויקים הללו אשר הניחו את היסודות לכל מה שאנו יודעים היום כעובדה גמורה בספרות הקלאסית המוכרת היטב.",
                    "לא.",
                    "מבצעים רק מבחן T מזווג במקום כאמצעי גיבוי רשמי לאור ההפרעה שהתגלתה באומדני טעות התקן הקריטית למרווחים המוצגים לפנינו כעת ואשר מעידה על כשל טכני באיסוף הנתונים המקדים מן השטח המצריך התערבות מחקרית כירורגית מקיפה לתיקון הפגם המובנה לפני המשך עיבוד הנתונים הסטנדרטיים בתוכנה המסחרית המקובלת באקדמיה העולמית זה שנים רבות ללא כל שינוי מהותי בגרסאות ההמשך ששוחררו על ידי החברה המפתחת מעבר לים כחלק ממדיניות השדרוג העונתית שלה למנויים הרשומים במערכת התמיכה המקוונת המספקת שירות יעיל ללקוחות מרוצים מכל רחבי תבל מדי יום ביומו ללא הפסקות או תקלות שרת נראות לעין."
                ], ans: 2,
                exp: "הכלל תקף גם כאן בדיוק כמו באנובה חד-כיוונית - פוסט הוק או התעמקות באפקטים מפורטים (Simple effects) מבוצעים רק ואך ורק אם מצאנו קודם לכן משהו מובהק שמצדיק את המשך החקירה. אם הכל לא מובהק, הניתוח נפסק מיד במקום ואין שום הצדקה להפעיל מבחני המשך מיותרים המנפחים שגיאות דגימה."
            }
        ];

        // --- Logic & App Flow ---
        let currentQIndex = 0;
        let score = 0;
        let shuffledQuestions = [];
        let userAnswers = [];

        function initApp() {
            // Shuffle all questions
            shuffledQuestions = [...qData].sort(() => Math.random() - 0.5);
            userAnswers = new Array(shuffledQuestions.length).fill(null);
            
            renderQuestion();
            updateProgress();
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQIndex];
            document.getElementById('qText').innerHTML = `<strong>שאלה ${currentQIndex + 1}:</strong> ${q.q}`;
            document.getElementById('qTable').innerHTML = q.t ? q.t : '';
            
            let optsHTML = '';
            q.options.forEach((opt, idx) => {
                let btnClass = 'opt-btn';
                let disabledAttr = '';
                
                if (userAnswers[currentQIndex] !== null) {
                    disabledAttr = 'disabled';
                    if (idx === q.ans) btnClass += ' correct';
                    else if (idx === userAnswers[currentQIndex]) btnClass += ' wrong';
                }

                optsHTML += `<button class="${btnClass}" ${disabledAttr} onclick="handleAnswer(${idx})">${opt}</button>`;
            });
            document.getElementById('optGrid').innerHTML = optsHTML;

            const fbBox = document.getElementById('fbBox');
            const nextBtn = document.getElementById('nextBtn');

            if (userAnswers[currentQIndex] !== null) {
                showFeedback(currentQIndex, userAnswers[currentQIndex]);
                nextBtn.style.display = 'inline-block';
            } else {
                fbBox.style.display = 'none';
                fbBox.className = 'feedback';
                nextBtn.style.display = 'none';
            }

            if (currentQIndex === shuffledQuestions.length - 1 && userAnswers[currentQIndex] !== null) {
                nextBtn.innerText = 'הגש מבחן וצפה בציון 🏆';
            } else {
                nextBtn.innerText = 'לשאלה הבאה ❯';
            }
        }

        function handleAnswer(selectedIdx) {
            if (userAnswers[currentQIndex] !== null) return;

            userAnswers[currentQIndex] = selectedIdx;
            const q = shuffledQuestions[currentQIndex];
            
            if (selectedIdx === q.ans) score++;

            renderQuestion();
            updateProgress();
        }

        function showFeedback(idx, selectedIdx) {
            const q = shuffledQuestions[idx];
            const isCorrect = selectedIdx === q.ans;
            const fbBox = document.getElementById('fbBox');
            const fbIcon = document.getElementById('fbIcon');
            const fbContent = document.getElementById('fbContent');
            
            if (isCorrect) {
                fbBox.className = 'feedback is-correct';
                fbIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> מצוין! תשובה נכונה.`;
                fbContent.innerHTML = `<p><strong>הסבר מקצועי:</strong> ${q.exp}</p>`;
            } else {
                fbBox.className = 'feedback is-wrong';
                fbIcon.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> טעות. שים לב לפרטים:`;
                fbContent.innerHTML = `
                    <div style="margin-bottom:10px;">התשובה שהיית צריך לבחור היא:</div>
                    <div class="correct-answer-box">${q.options[q.ans]}</div>
                    <p><strong>למה? הנה ההסבר הסטטיסטי לטעות:</strong> ${q.exp}</p>
                `;
            }
        }

        function nextQuestion() {
            if (currentQIndex < shuffledQuestions.length - 1) {
                currentQIndex++;
                renderQuestion();
                updateProgress();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            const percent = (answeredCount / shuffledQuestions.length) * 100;
            
            document.getElementById('qCount').innerText = `שאלה ${currentQIndex + 1} מתוך ${shuffledQuestions.length}`;
            document.getElementById('scoreCount').innerText = `תשובות נכונות: ${score}`;
            document.getElementById('pFill').style.width = `${percent}%`;
        }

        function showResults() {
            document.getElementById('quizApp').style.display = 'none';
            const resultsScreen = document.getElementById('resultsScreen');
            resultsScreen.style.display = 'block';

            const percent = Math.round((score / shuffledQuestions.length) * 100);
            
            let curP = 0;
            const scoreDisplay = document.getElementById('finalScore');
            const tmr = setInterval(() => {
                curP += 1;
                if (curP >= percent) {
                    curP = percent;
                    clearInterval(tmr);
                }
                scoreDisplay.innerText = `${curP}%`;
            }, 25);

            let msg = "";
            if (percent >= 90) msg = "מבריק! השליטה שלך בחומר הסטטיסטי פנומנלית. אתה מוכן במאת האחוזים למבחן. 🏆";
            else if (percent >= 75) msg = "כל הכבוד! הישג מרשים, היכולת שלך לקרוא ולנתח את הפלטים טובה מאוד. 🌟";
            else if (percent >= 60) msg = "עברת! אבל כדי להיות בטוח ביום המבחן, מומלץ לעבור שוב על ההסברים של השאלות בהן טעית. 👍";
            else msg = "זה הזמן לחזרה מעמיקה. קרא היטב את ההסברים המפורטים כדי להבין את חוקי ה-Sig והנחות המבחנים השונים, ונסה שוב! 💪";

            document.getElementById('finalMsg').innerHTML = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Start App
        initApp();
    </script>
